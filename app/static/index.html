<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic CI/CD Repairs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #1a1a1a;
            color: #ccc;
            min-height: 100vh;
        }

        /* ---- Header ---- */
        .header {
            background: #222;
            border-bottom: 1px solid #2e2e2e;
            padding: 16px 32px;
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 1.1rem;
            font-weight: 700;
            color: #eee;
            letter-spacing: -0.02em;
        }

        .header-subtitle {
            font-size: 0.72rem;
            color: #777;
            font-weight: 400;
            margin-top: 2px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.72rem;
            color: #777;
        }

        .live-dot {
            width: 7px;
            height: 7px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* ---- Container ---- */
        .container {
            padding: 24px 32px 80px;
        }

        .empty-state {
            text-align: center;
            padding: 100px 24px;
            color: #666;
            font-size: 0.88rem;
        }

        .empty-state .primary {
            color: #999;
            font-weight: 500;
            font-size: 0.95rem;
            margin-bottom: 6px;
        }

        /* ---- Card ---- */
        .card {
            background: #242424;
            border: 1px solid #2e2e2e;
            border-radius: 8px;
            margin-bottom: 16px;
            overflow: hidden;
        }

        .card-header {
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #282828;
            border-bottom: 1px solid #2e2e2e;
        }

        .card-header-left {
            display: flex;
            align-items: center;
            gap: 14px;
            min-width: 0;
        }

        .card-repo {
            font-size: 0.88rem;
            font-weight: 600;
            color: #ddd;
        }

        .card-commit {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.68rem;
            color: #666;
            font-weight: 400;
        }

        .card-body {
            padding: 20px 24px;
        }

        /* ---- Badges ---- */
        .badge {
            display: inline-block;
            font-size: 0.62rem;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 3px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            flex-shrink: 0;
        }

        .badge-pending  { background: #332b00; color: #ca8a04; border: 1px solid #3d3400; }
        .badge-passed   { background: #0a2e16; color: #4ade80; border: 1px solid #0f3d1e; }
        .badge-resolved { background: #0a2e16; color: #4ade80; border: 1px solid #0f3d1e; }
        .badge-failed   { background: #2e0a0a; color: #f87171; border: 1px solid #3d0f0f; }

        /* ---- Logs ---- */
        .section-label {
            display: block;
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: #666;
            margin-bottom: 8px;
        }

        pre {
            background: #1a1a1a;
            border: 1px solid #2e2e2e;
            border-radius: 5px;
            padding: 14px 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.73rem;
            line-height: 1.7;
            overflow-x: auto;
            max-height: 160px;
            overflow-y: auto;
            color: #aaa;
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
        }

        pre.error-log {
            color: #f87171;
            background: #1f1212;
            border-color: #2e1a1a;
        }

        pre.patch-log {
            color: #86efac;
            background: #121f12;
            border-color: #1a2e1a;
        }

        /* ---- Divider ---- */
        .divider {
            border: none;
            border-top: 1px solid #2e2e2e;
            margin: 0;
        }

        /* ---- Agent Grid ---- */
        .agent-grid {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 24px;
        }

        .agent-section {
            min-width: 0;
        }

        .agent-label {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #666;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid #2e2e2e;
        }

        .agent-section p {
            font-size: 0.84rem;
            line-height: 1.7;
            color: #bbb;
        }

        .patch-label {
            margin-top: 20px;
        }

        /* ---- Risk ---- */
        .risk-meter {
            margin: 14px 0 18px;
        }

        .risk-bar-bg {
            height: 4px;
            background: #333;
            border-radius: 2px;
            overflow: hidden;
        }

        .risk-bar-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.5s ease;
        }

        .risk-bar-fill.low    { background: #22c55e; }
        .risk-bar-fill.medium { background: #eab308; }
        .risk-bar-fill.high   { background: #ef4444; }

        .risk-info {
            display: flex;
            justify-content: space-between;
            margin-top: 6px;
            font-size: 0.68rem;
            color: #666;
        }

        .risk-info .score {
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
            color: #999;
        }

        /* ---- Actions ---- */
        .actions {
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid #2e2e2e;
            text-align: center;
        }

        .actions-hint {
            font-size: 0.62rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #555;
            margin-bottom: 12px;
        }

        button {
            font-family: 'Inter', sans-serif;
            font-size: 0.78rem;
            font-weight: 600;
            padding: 8px 22px;
            border-radius: 5px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .btn-approve {
            background: #e5e5e5;
            color: #1a1a1a;
            margin-right: 8px;
        }

        .btn-approve:hover {
            background: #fff;
        }

        .btn-reject {
            background: transparent;
            color: #777;
            border-color: #3a3a3a;
        }

        .btn-reject:hover {
            background: #2e2e2e;
            color: #bbb;
        }

        /* ---- Result ---- */
        .result-ok {
            text-align: center;
            padding: 4px 0;
        }

        .result-ok .lbl {
            font-size: 0.84rem;
            font-weight: 600;
            color: #4ade80;
            margin-bottom: 8px;
        }

        .result-ok a {
            font-size: 0.78rem;
            color: #888;
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        .result-ok a:hover { color: #ccc; }

        .result-no .lbl {
            font-size: 0.84rem;
            font-weight: 600;
            color: #f87171;
            text-align: center;
        }

        /* ---- Passed ---- */
        .passed-body {
            text-align: center;
            padding: 28px 24px 20px;
        }

        .passed-icon {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: #0f3d1e;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 0.95rem;
            color: #4ade80;
        }

        .passed-body .title {
            font-size: 0.88rem;
            font-weight: 600;
            color: #4ade80;
            margin-bottom: 3px;
        }

        .passed-body .sub {
            font-size: 0.78rem;
            color: #666;
        }

        /* ---- Analyzing ---- */
        .analyzing {
            text-align: center;
            padding: 32px 24px;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #333;
            border-top-color: #999;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: inline-block;
            margin-bottom: 10px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .analyzing p {
            font-size: 0.8rem;
            color: #666;
            font-weight: 500;
        }

        /* ---- Responsive ---- */
        @media (max-width: 900px) {
            .agent-grid { grid-template-columns: 1fr; }
            .container { padding: 16px 16px 60px; }
            .header { padding: 14px 16px; }
        }
    </style>
</head>

<body>
    <div class="header">
        <div>
            <h1>Agentic CI/CD Repair</h1>
            <div class="header-subtitle">Autonomous pipeline monitoring and repair</div>
        </div>
        <div class="header-right">
            <span class="live-dot"></span>
            <span>Live</span>
        </div>
    </div>

    <div class="container" id="incidents-container">
        <div class="empty-state"><p class="primary">Loading...</p></div>
    </div>

    <script>
        function bc(s) {
            return { passed:'badge-passed', resolved:'badge-resolved', pending:'badge-pending' }[s] || 'badge-failed';
        }
        function rl(s) { return s < 35 ? 'low' : s < 65 ? 'medium' : 'high'; }
        function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        async function fetchIncidents() {
            const res = await fetch('/api/incidents');
            const data = await res.json();
            const c = document.getElementById('incidents-container');
            c.innerHTML = '';

            if (!data.length) {
                c.innerHTML = '<div class="empty-state"><p class="primary">No incidents recorded</p><p>Push a commit or send a webhook to get started.</p></div>';
                return;
            }

            data.forEach(inc => {
                /* ===== PASSED ===== */
                if (inc.status === 'passed') {
                    c.innerHTML += `
                        <div class="card">
                            <div class="card-header">
                                <div class="card-header-left">
                                    <span class="card-repo">${esc(inc.repo_name)}</span>
                                    <span class="card-commit">${esc(inc.commit_hash)}</span>
                                </div>
                                <span class="badge badge-passed">Passed</span>
                            </div>
                            <div class="passed-body">
                                <div class="passed-icon">&#10003;</div>
                                <div class="title">All checks passed</div>
                                <div class="sub">Syntax validation and tests completed successfully.</div>
                            </div>
                        </div>`;
                    return;
                }

                /* ===== FAILURE ===== */
                const fix = inc.fixes.length > 0 ? inc.fixes[inc.fixes.length - 1] : null;
                let fh = `<hr class="divider"><div class="analyzing"><div class="spinner"></div><p>Agents are analyzing this failure...</p></div>`;

                if (fix) {
                    let ah = '';
                    if (fix.status === 'pending_approval') {
                        ah = `<div class="actions">
                                <div class="actions-hint">Human Authorization Required</div>
                                <button class="btn-approve" onclick="reviewFix(${fix.id},'approve')">Approve Patch</button>
                                <button class="btn-reject" onclick="reviewFix(${fix.id},'reject')">Reject</button>
                              </div>`;
                    } else if (fix.status === 'approved') {
                        const pl = fix.pr_url && fix.pr_url !== '#' ? `<a href="${fix.pr_url}" target="_blank">View Pull Request</a>` : '';
                        ah = `<div class="actions"><div class="result-ok"><div class="lbl">Patch approved and pushed</div>${pl}</div></div>`;
                    } else {
                        ah = `<div class="actions"><div class="result-no"><div class="lbl">Patch rejected</div></div></div>`;
                    }

                    fh = `<hr class="divider">
                        <div class="card-body" style="padding-top:16px">
                            <div class="agent-grid">
                                <div class="agent-section">
                                    <div class="agent-label">Detective Agent -- Root Cause</div>
                                    <p>${esc(fix.root_cause)}</p>
                                    <div class="agent-label patch-label">Developer Agent -- Proposed Patch</div>
                                    <pre class="patch-log">${esc(fix.patch_code)}</pre>
                                </div>
                                <div class="agent-section">
                                    <div class="agent-label">Security Review</div>
                                    <div class="risk-meter">
                                        <div class="risk-bar-bg"><div class="risk-bar-fill ${rl(fix.risk_score)}" style="width:${fix.risk_score}%"></div></div>
                                        <div class="risk-info"><span>Risk Assessment</span><span class="score">${fix.risk_score}/100</span></div>
                                    </div>
                                    <p>${esc(fix.risk_reasoning)}</p>
                                    ${ah}
                                </div>
                            </div>
                        </div>`;
                }

                c.innerHTML += `
                    <div class="card">
                        <div class="card-header">
                            <div class="card-header-left">
                                <span class="card-repo">${esc(inc.repo_name)}</span>
                                <span class="card-commit">${esc(inc.commit_hash)}</span>
                            </div>
                            <span class="badge ${bc(inc.status)}">${inc.status}</span>
                        </div>
                        <div class="card-body">
                            <span class="section-label">Error Logs</span>
                            <pre class="error-log">${esc(inc.error_logs)}</pre>
                        </div>
                        ${fh}
                    </div>`;
            });
        }

        async function reviewFix(id, act) {
            await fetch(`/api/fixes/${id}/${act}`, { method: 'POST' });
            fetchIncidents();
        }

        fetchIncidents();
        setInterval(fetchIncidents, 3000);
    </script>
</body>

</html>
