version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: agentic_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d agentic_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@db:5432/agentic_db
      - LLM_API_KEY=${LLM_API_KEY}

      # --- Agentic AI Configuration ---
      # Example models: 'gpt-oss:120b-cloud', 'deepseek-v3.1:671b-cloud', 'glm5.1-cloud'
      - LLM_MODEL=gpt-oss:120b-cloud
      - LLM_API_BASE=https://api.ollama.com

      - OLLAMA_BASE_URL=http://host.docker.internal:11434

      # --- GitHub Automation Configuration ---
      # Required for the system to automatically generate Pull Requests.
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
