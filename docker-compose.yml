version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: agentic_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d agentic_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@db:5432/agentic_db
      # Connects to host's Ollama instance. Uses host.docker.internal on Docker Desktop 
      # Or standard loopback if running in native Linux docker networking.
      - OLLAMA_BASE_URL=http://host.docker.internal:11434 
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
