name: CI/CD Pipeline with Agentic Repair

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        
    - name: Set up Python Environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install Dependencies
      id: install
      run: |
        python -m pip install --upgrade pip >> pipeline_output.log 2>&1 || exit 1
        if [ -f requirements.txt ]; then pip install -r requirements.txt >> pipeline_output.log 2>&1 || exit 1; fi
        pip install pytest >> pipeline_output.log 2>&1 || exit 1

    - name: Run PyTest and Syntax Checks
      id: tests
      if: success() || steps.install.outcome == 'success'
      run: |
        echo "Running automated test suites and syntax validations..." >> pipeline_output.log
        
        # Only compile Python files changed in the CURRENT commit so we don't flag
        # pre-existing errors from older commits.
        CHANGED_PY=$(git log -1 --name-only --format="" --diff-filter=ACMR HEAD -- '*.py' 2>/dev/null || true)
        if [ -n "$CHANGED_PY" ]; then
          echo "Syntax-checking changed files: $CHANGED_PY" >> pipeline_output.log
          echo "$CHANGED_PY" | xargs python -m py_compile >> pipeline_output.log 2>&1 || exit 1
        fi
        
        # Run pytest only if any Python file changed in the current commit.
        # This catches runtime errors introduced by the new code while ignoring
        # failures from commits that didn't touch Python files at all.
        if [ -n "$CHANGED_PY" ]; then
          echo "Python files changed -- running full test suite..." >> pipeline_output.log
          pytest . >> pipeline_output.log 2>&1 || exit 1
        else
          echo "No Python files changed in this commit. Skipping tests." >> pipeline_output.log
        fi
      continue-on-error: true

    - name: Trigger Agentic AI Repair (On Failure)
      if: steps.install.outcome == 'failure' || steps.tests.outcome == 'failure'
      env:
        GITHUB_TOKEN_PAT: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "Pipeline Failed! Packaging error context for Agentic AI..."
        
        GIT_DIFF=$(git log -1 -p --format="" HEAD | head -200 || echo "No diff available")
        ERROR_LOGS=$(tail -n 100 pipeline_output.log || echo "Test logs missing")
        
        PAYLOAD=$(jq -n \
                  --arg repo "${{ github.repository }}" \
                  --arg commit "${{ github.sha }}" \
                  --arg diff "$GIT_DIFF" \
                  --arg logs "$ERROR_LOGS" \
                  --arg status "failed" \
                  '{repo_name: $repo, commit_hash: $commit, error_logs: $logs, git_diff: $diff, status: $status}')
                  
        # 1. Send failure to the Agentic backend and capture the incident ID
        RESPONSE=$(curl -s -X POST "${{ secrets.AGENTIC_WEBHOOK_URL }}/webhook/ci_failure" \
             -H "Content-Type: application/json" \
             -d "$PAYLOAD")
        
        INCIDENT_ID=$(echo "$RESPONSE" | jq -r '.incident_id')
        echo "Agentic AI pipeline triggered. Incident ID: $INCIDENT_ID"
        
        if [ "$INCIDENT_ID" = "null" ] || [ -z "$INCIDENT_ID" ]; then
          echo "ERROR: Could not get incident ID from backend."
          exit 1
        fi
        
        # 2. Poll the backend every 10 seconds until the AI fix is ready (max 5 minutes)
        echo "Waiting for AI agents to generate a fix..."
        FIX_READY="false"
        PATCH_CODE=""
        for i in $(seq 1 30); do
          sleep 10
          STATUS_RESPONSE=$(curl -s "${{ secrets.AGENTIC_WEBHOOK_URL }}/api/incidents/${INCIDENT_ID}/status")
          FIX_READY=$(echo "$STATUS_RESPONSE" | jq -r '.fix_ready')
          
          if [ "$FIX_READY" = "true" ]; then
            PATCH_CODE=$(echo "$STATUS_RESPONSE" | jq -r '.patch_code')
            ROOT_CAUSE=$(echo "$STATUS_RESPONSE" | jq -r '.root_cause')
            RISK_SCORE=$(echo "$STATUS_RESPONSE" | jq -r '.risk_score')
            FIX_ID=$(echo "$STATUS_RESPONSE" | jq -r '.fix_id')
            echo "AI fix generated!"
            echo "Root Cause: $ROOT_CAUSE"
            echo "Risk Score: $RISK_SCORE"
            break
          fi
          echo "  Attempt $i/30 - AI agents still working..."
        done
        
        if [ "$FIX_READY" != "true" ]; then
          echo "ERROR: AI pipeline did not produce a fix within 5 minutes."
          exit 1
        fi
        
        # 3. Apply the AI-generated patch to the current working tree
        echo "Applying AI-generated patch..."
        echo "$PATCH_CODE" > ai_fix.patch
        
        git apply --ignore-whitespace --ignore-space-change --recount ai_fix.patch 2>/dev/null \
          || git apply --ignore-whitespace --recount --3way ai_fix.patch 2>/dev/null \
          || (echo "git apply failed, trying patch utility..." && patch -p1 --force < ai_fix.patch)
        
        rm -f ai_fix.patch
        
        # 4. Commit and push the fix to the current branch
        BRANCH_NAME="${GITHUB_REF#refs/heads/}"
        git config user.name "Agentic CI/CD Bot"
        git config user.email "agentic-bot@hacktofuture.com"
        git add .
        
        if git diff --cached --quiet; then
          echo "No changes resulted from the patch. Exiting."
          exit 1
        fi
        
        git commit -m "Agentic Fix: auto-repair for commit ${{ github.sha }}" \
                   -m "Root Cause: $ROOT_CAUSE" \
                   -m "Risk Score: $RISK_SCORE/100" \
                   -m "Automated fix generated by the Agentic CI/CD Repair Pipeline."
        
        git remote set-url origin "https://x-access-token:${{ secrets.REPO_PAT }}@github.com/${{ github.repository }}.git"
        git push origin HEAD:$BRANCH_NAME
        
        echo "Fix applied and pushed to $BRANCH_NAME!"
        
        # 5. Auto-approve the fix on the dashboard
        curl -s -X POST "${{ secrets.AGENTIC_WEBHOOK_URL }}/api/fixes/${FIX_ID}/approve" || true

    - name: Report Success to Dashboard
      if: steps.install.outcome == 'success' && steps.tests.outcome == 'success'
      run: |
        echo "Pipeline Passed! Reporting success to Agentic Dashboard..."
        
        GIT_DIFF=$(git log -1 -p --format="" HEAD -- '*.py' | head -200 || echo "No changes")
        
        PAYLOAD=$(jq -n \
                  --arg repo "${{ github.repository }}" \
                  --arg commit "${{ github.sha }}" \
                  --arg diff "$GIT_DIFF" \
                  --arg logs "All syntax checks and tests passed successfully." \
                  --arg status "passed" \
                  '{repo_name: $repo, commit_hash: $commit, error_logs: $logs, git_diff: $diff, status: $status}')
                  
        curl -X POST "${{ secrets.AGENTIC_WEBHOOK_URL }}/webhook/ci_failure" \
             -H "Content-Type: application/json" \
             -d "$PAYLOAD" || true
             
        echo "Success reported to dashboard."
